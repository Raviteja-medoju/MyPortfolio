<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f1219"/>
      <stop offset="100%" stop-color="#1a1f2e"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="rose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="50" x2="800" y2="50"/><line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/><line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/><line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="450"/><line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="450"/><line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/><line x1="600" y1="0" x2="600" y2="450"/>
    <line x1="700" y1="0" x2="700" y2="450"/>
  </g>

  <!-- Dashboard panel left -->
  <rect x="40" y="50" width="340" height="350" rx="12" fill="#1e2433" stroke="#2d3548" stroke-width="1"/>

  <!-- Mini header bar -->
  <rect x="40" y="50" width="340" height="36" rx="12" fill="#252d3f"/>
  <rect x="40" y="74" width="340" height="12" fill="#252d3f"/>
  <circle cx="58" cy="68" r="5" fill="#f43f5e" opacity="0.8"/>
  <circle cx="74" cy="68" r="5" fill="#fbbf24" opacity="0.8"/>
  <circle cx="90" cy="68" r="5" fill="#4ade80" opacity="0.8"/>
  <text x="210" y="72" font-family="sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">Employee Analytics Dashboard</text>

  <!-- Bar chart -->
  <g transform="translate(60, 105)">
    <text x="0" y="0" font-family="monospace" font-size="9" fill="#60a5fa" opacity="0.8">ATTRITION BY DEPARTMENT</text>

    <!-- Y axis labels -->
    <text x="-5" y="30" font-family="monospace" font-size="8" fill="#6b7280" text-anchor="end">50%</text>
    <text x="-5" y="70" font-family="monospace" font-size="8" fill="#6b7280" text-anchor="end">25%</text>
    <text x="-5" y="110" font-family="monospace" font-size="8" fill="#6b7280" text-anchor="end">0%</text>
    <line x1="0" y1="15" x2="295" y2="15" stroke="#2d3548" stroke-width="0.5"/>
    <line x1="0" y1="55" x2="295" y2="55" stroke="#2d3548" stroke-width="0.5"/>
    <line x1="0" y1="95" x2="295" y2="95" stroke="#2d3548" stroke-width="0.5"/>
    <line x1="0" y1="110" x2="295" y2="110" stroke="#2d3548" stroke-width="1"/>

    <!-- Bars -->
    <rect x="15" y="35" width="35" height="75" rx="4" fill="url(#blue)" opacity="0.8"/>
    <rect x="65" y="55" width="35" height="55" rx="4" fill="url(#cyan)" opacity="0.8"/>
    <rect x="115" y="25" width="35" height="85" rx="4" fill="url(#rose)" opacity="0.8"/>
    <rect x="165" y="65" width="35" height="45" rx="4" fill="url(#purple)" opacity="0.8"/>
    <rect x="215" y="45" width="35" height="65" rx="4" fill="url(#blue)" opacity="0.8"/>
    <rect x="265" y="70" width="35" height="40" rx="4" fill="url(#cyan)" opacity="0.8"/>

    <!-- Labels -->
    <text x="32" y="124" font-family="sans-serif" font-size="7" fill="#9ca3af" text-anchor="middle">Sales</text>
    <text x="82" y="124" font-family="sans-serif" font-size="7" fill="#9ca3af" text-anchor="middle">R&amp;D</text>
    <text x="132" y="124" font-family="sans-serif" font-size="7" fill="#9ca3af" text-anchor="middle">HR</text>
    <text x="182" y="124" font-family="sans-serif" font-size="7" fill="#9ca3af" text-anchor="middle">Eng</text>
    <text x="232" y="124" font-family="sans-serif" font-size="7" fill="#9ca3af" text-anchor="middle">Ops</text>
    <text x="282" y="124" font-family="sans-serif" font-size="7" fill="#9ca3af" text-anchor="middle">Mkt</text>
  </g>

  <!-- Donut chart -->
  <g transform="translate(130, 310)">
    <circle cx="0" cy="0" r="42" fill="none" stroke="#2d3548" stroke-width="12"/>
    <circle cx="0" cy="0" r="42" fill="none" stroke="#f43f5e" stroke-width="12" stroke-dasharray="79 185" stroke-dashoffset="0" opacity="0.85"/>
    <circle cx="0" cy="0" r="42" fill="none" stroke="#3b82f6" stroke-width="12" stroke-dasharray="132 132" stroke-dashoffset="-79" opacity="0.85"/>
    <circle cx="0" cy="0" r="42" fill="none" stroke="#4ade80" stroke-width="12" stroke-dasharray="53 211" stroke-dashoffset="-211" opacity="0.85"/>
    <text x="0" y="-4" font-family="sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">30%</text>
    <text x="0" y="10" font-family="monospace" font-size="8" fill="#9ca3af" text-anchor="middle">at risk</text>
  </g>

  <!-- Legend -->
  <g transform="translate(200, 280)">
    <rect x="0" y="0" width="8" height="8" rx="2" fill="#f43f5e"/>
    <text x="14" y="8" font-family="sans-serif" font-size="8" fill="#9ca3af">High Risk</text>
    <rect x="0" y="16" width="8" height="8" rx="2" fill="#3b82f6"/>
    <text x="14" y="24" font-family="sans-serif" font-size="8" fill="#9ca3af">Medium Risk</text>
    <rect x="0" y="32" width="8" height="8" rx="2" fill="#4ade80"/>
    <text x="14" y="40" font-family="sans-serif" font-size="8" fill="#9ca3af">Low Risk</text>
  </g>

  <!-- Right panel: prediction model -->
  <rect x="420" y="50" width="340" height="350" rx="12" fill="#1e2433" stroke="#2d3548" stroke-width="1"/>
  <rect x="420" y="50" width="340" height="36" rx="12" fill="#252d3f"/>
  <rect x="420" y="74" width="340" height="12" fill="#252d3f"/>
  <text x="590" y="72" font-family="sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">Prediction Model</text>

  <!-- Feature importance bars -->
  <g transform="translate(440, 100)">
    <text x="0" y="0" font-family="monospace" font-size="9" fill="#a78bfa" opacity="0.8">FEATURE IMPORTANCE</text>

    <text x="0" y="28" font-family="sans-serif" font-size="9" fill="#d1d5db">Satisfaction</text>
    <rect x="90" y="19" width="200" height="12" rx="3" fill="#1f2937"/>
    <rect x="90" y="19" width="180" height="12" rx="3" fill="url(#purple)" opacity="0.8"/>
    <text x="275" y="29" font-family="monospace" font-size="8" fill="#a78bfa">0.89</text>

    <text x="0" y="52" font-family="sans-serif" font-size="9" fill="#d1d5db">Overtime</text>
    <rect x="90" y="43" width="200" height="12" rx="3" fill="#1f2937"/>
    <rect x="90" y="43" width="155" height="12" rx="3" fill="url(#rose)" opacity="0.8"/>
    <text x="250" y="53" font-family="monospace" font-size="8" fill="#fb7185">0.76</text>

    <text x="0" y="76" font-family="sans-serif" font-size="9" fill="#d1d5db">Tenure</text>
    <rect x="90" y="67" width="200" height="12" rx="3" fill="#1f2937"/>
    <rect x="90" y="67" width="130" height="12" rx="3" fill="url(#blue)" opacity="0.8"/>
    <text x="225" y="77" font-family="monospace" font-size="8" fill="#60a5fa">0.64</text>

    <text x="0" y="100" font-family="sans-serif" font-size="9" fill="#d1d5db">Salary</text>
    <rect x="90" y="91" width="200" height="12" rx="3" fill="#1f2937"/>
    <rect x="90" y="91" width="110" height="12" rx="3" fill="url(#cyan)" opacity="0.8"/>
    <text x="205" y="101" font-family="monospace" font-size="8" fill="#22d3ee">0.55</text>

    <text x="0" y="124" font-family="sans-serif" font-size="9" fill="#d1d5db">Distance</text>
    <rect x="90" y="115" width="200" height="12" rx="3" fill="#1f2937"/>
    <rect x="90" y="115" width="80" height="12" rx="3" fill="#fbbf24" opacity="0.7"/>
    <text x="175" y="125" font-family="monospace" font-size="8" fill="#fbbf24">0.41</text>
  </g>

  <!-- Confusion matrix mini -->
  <g transform="translate(440, 260)">
    <text x="0" y="0" font-family="monospace" font-size="9" fill="#22d3ee" opacity="0.8">CONFUSION MATRIX</text>
    <rect x="50" y="15" width="55" height="40" rx="4" fill="#4ade80" opacity="0.15" stroke="#4ade80" stroke-width="0.5"/>
    <text x="77" y="40" font-family="monospace" font-size="14" font-weight="bold" fill="#4ade80" text-anchor="middle">842</text>
    <rect x="110" y="15" width="55" height="40" rx="4" fill="#f43f5e" opacity="0.1" stroke="#f43f5e" stroke-width="0.5"/>
    <text x="137" y="40" font-family="monospace" font-size="14" font-weight="bold" fill="#f43f5e" text-anchor="middle">23</text>
    <rect x="50" y="60" width="55" height="40" rx="4" fill="#f43f5e" opacity="0.1" stroke="#f43f5e" stroke-width="0.5"/>
    <text x="77" y="85" font-family="monospace" font-size="14" font-weight="bold" fill="#f43f5e" text-anchor="middle">31</text>
    <rect x="110" y="60" width="55" height="40" rx="4" fill="#4ade80" opacity="0.15" stroke="#4ade80" stroke-width="0.5"/>
    <text x="137" y="85" font-family="monospace" font-size="14" font-weight="bold" fill="#4ade80" text-anchor="middle">104</text>
    <text x="77" y="112" font-family="monospace" font-size="7" fill="#9ca3af" text-anchor="middle">Stay</text>
    <text x="137" y="112" font-family="monospace" font-size="7" fill="#9ca3af" text-anchor="middle">Leave</text>
  </g>

  <!-- Tech badges bottom -->
  <rect x="440" y="375" width="60" height="20" rx="4" fill="#61dafb" opacity="0.12"/>
  <text x="470" y="389" font-family="monospace" font-size="9" fill="#61dafb" text-anchor="middle">React</text>

  <rect x="510" y="375" width="75" height="20" rx="4" fill="#f0db4f" opacity="0.1"/>
  <text x="547" y="389" font-family="monospace" font-size="9" fill="#f0db4f" text-anchor="middle">Bootstrap</text>

  <rect x="595" y="375" width="55" height="20" rx="4" fill="#3b82f6" opacity="0.12"/>
  <text x="622" y="389" font-family="monospace" font-size="9" fill="#60a5fa" text-anchor="middle">MySQL</text>

  <rect x="660" y="375" width="60" height="20" rx="4" fill="#2496ed" opacity="0.12"/>
  <text x="690" y="389" font-family="monospace" font-size="9" fill="#2496ed" text-anchor="middle">Docker</text>
</svg>
